<!DOCTYPE html>
<html>
<head>
  <title>RoboMonitor</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
const user = JSON.parse(localStorage.getItem("user"));
if (!user) location.href = "/login.html";
</script>

<h1>🤖 RoboMonitor</h1>
<p id="role"></p>

<div>
  <button onclick="filter('all')">Все</button>
  <button onclick="filter('active')">Активные</button>
  <button onclick="filter('idle')">Ожидание</button>
  <button onclick="filter('error')">Ошибки</button>
</div>

<table>
<thead>
<tr>
<th>ID</th><th>Имя</th><th>Статус</th><th>Батарея</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<h2>📊 Аналитика</h2>
<canvas id="batteryChart"></canvas>
<canvas id="workChart"></canvas>

<script src="script.js"></script>
</body>
</html>
